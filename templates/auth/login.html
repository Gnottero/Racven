{% extends "base.html" %}
{% block title %}Accedi &middot; Turn Piatts{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Bentornato</h1>
    <p>Accedi con il tuo tag utente per continuare.</p>
</div>

<div class="card">
    <h2>Accedi</h2>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label for="user_tag">Tag utente</label>
        <input class="input" type="text" id="user_tag" name="user_tag" placeholder="@iltuotag" value="{{ user_tag }}" required autofocus>

        <label for="password">Password</label>
        <input class="input" type="password" id="password" name="password" required>

        <button class="btn btn-primary btn-block" type="submit">Accedi</button>
    </form>
</div>
<p>Non hai un account? <a href="{{ url_for('auth.register') }}">Registrati</a></p>
{% endblock %}
